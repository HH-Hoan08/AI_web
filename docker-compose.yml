
services:
  mysql_db:
    image: mysql:8.4
    restart: always
    env_file:
      - /ad.env
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ai_api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - mysql_db

volumes:
  mysql_data: